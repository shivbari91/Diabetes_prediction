<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction Model</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='index.css') }}">
</head>
<body>
    <h1>Diabetes prediction </h1>
    <br>
    <h2>Enter Patient Detail</h2>
    <br>
    <h3>Fill all the field below </h3>

    <form action="/predict" method="POST">
        <label for="Pregnancies">Pregnancies:</label><br>
        <input type="number" id="Pregnancies" name="Pregnancies" min="0" placeholder="Enter pregnancies" required>
        <br>
        <label for="Glucose">Glucose:</label><br>
        <input type="number" id="Glucose" name="Glucose" min="0" placeholder="Enter glucose level" required>
        <br>
        <label for="BloodPressure">Blood Pressure:</label><br>
        <input type="number" id="BloodPressure" name="BloodPressure" min="0" placeholder="Enter blood Pressure level" required>
        <br>
        <label for="SkinThickness">Skin Thickness:</label><br>
        <input type="number" id="SkinThickness" name="SkinThickness" min="0" placeholder="Enter skin thickness level" required>
        <br>
        <label for="Insulin">Insulin:</label><br>
        <input type="number" id="Insulin" name="Insulin" min="0" placeholder="Enter insulin level" required>
        <br>
        <label for="BMI">BMI:</label><br>
        <input type="number" step="0.1" id="BMI" name="BMI" min="0" placeholder="Enter BMI level" required>
        <br>
        <label for="DiabetesPedigreeFunction">Diabetes Pedigree Function:</label><br>
        <input type="number" step="0.001"id="DiabetesPedigreeFunction" name="DiabetesPedigreeFunction" min="0" placeholder="Enter Diabetes Pedigree Function level" required>
        <br>
        <label for="Age">Age:</label><br>
        <input type="number" id="Age" name="Age" min="1" max="120" placeholder="Enter Age " required>
        <br><br>
        <button type="submit">Submit</button><br>

    </form>
    {% if prediction_text %}
<div class="result">
    <h2>{{ prediction_text }}</h2>
</div>
{% endif %}
    
    
</body>
</html>
